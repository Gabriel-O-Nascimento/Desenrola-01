server.port=8080
spring.application.name=desenrola-backend

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/desenrola_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.sql.init.mode=never
spring.jdbc.template.query-timeout=30

# Configuracao do Banco de Dados PostgreSQL
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/projeto_db}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DATABASE_USERNAME:usuario_projeto}
spring.datasource.password=${DATABASE_PASSWORD:senha_projeto}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Desabilita console H2 quando o perfil postgres estiver ativo
spring.h2.console.enabled=false

# Configuracao do Banco de Dados MySQL
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/desenrola_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Desabilita console H2 quando o perfil mysql estiver ativo
spring.h2.console.enabled=false
